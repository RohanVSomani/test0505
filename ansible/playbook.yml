- name: Deploy to Tomcat
  hosts: web
  become: no
  tasks: 
    - name: Copy war file
      copy:
        src: "/var/snap/jenkins/5047/workspace/testansible/target/webwebweb.war"
        dest: "/opt/tomcat/webapps/webwebweb.war"
        remote_src: no
    - name: Restarted tomcat
      systemd:
        name: tomcat
        status: restarted
